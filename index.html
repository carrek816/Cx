<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAYBROS OS V16 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #000;
            --glass-light: rgba(255, 255, 255, 0.15);
            --glass-dark: rgba(0, 0, 0, 0.7);
            --blur: blur(25px);
        }

        /* منع التكبير والتفاعل غير المرغوب */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; touch-action: pan-x pan-y;
        }

        body, html {
            width: 100vw; height: 100vh;
            font-family: 'Cairo', sans-serif;
            background: #000; overflow: hidden;
            color: #fff;
        }

        /* المحرك البصري للخلفية */
        #wallpaper-master {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-image: url('https://w.wallhaven.cc/full/72/wallhaven-72r89e.jpg');
            background-size: cover; background-position: center;
            z-index: -1; transform: scale(1.1); transition: transform 2s;
        }

        /* شاشة القفل الفخمة */
        #lock-screen {
            position: fixed; inset: 0; z-index: 20000;
            background: rgba(0,0,0,0.3); backdrop-filter: var(--blur);
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .lock-content { margin-top: 80px; text-align: center; }
        .clock-big { font-size: 5.5rem; font-weight: 200; letter-spacing: -2px; }
        .date-sub { font-size: 1.4rem; font-weight: 400; opacity: 0.9; }
        .unlock-area { position: absolute; bottom: 50px; text-align: center; width: 100%; }
        .home-indicator-lock { width: 140px; height: 5px; background: #fff; border-radius: 10px; margin: 20px auto; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* شريط الحالة العلوي */
        #status-bar {
            position: fixed; top: 0; width: 100%; height: 44px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 15000; font-weight: 600; font-size: 0.9rem;
        }

        /* سطح المكتب */
        #desktop {
            display: grid; padding: 70px 25px;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 110px; gap: 20px;
            opacity: 0; transition: opacity 1s;
        }

        .app-node {
            display: flex; flex-direction: column; align-items: center;
            animation: appPop 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67) backwards;
        }
        @keyframes appPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .app-icon {
            width: 62px; height: 62px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-size: cover; margin-bottom: 8px;
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        .app-label { font-size: 0.8rem; font-weight: 600; text-shadow: 0 2px 4px #000; }

        /* نظام النوافذ - Windowing Logic */
        .os-window {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: none; flex-direction: column; transform: scale(0.9) translateY(100%);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); border-radius: 40px; overflow: hidden;
        }
        .os-window.open { display: flex; transform: scale(1) translateY(0); border-radius: 0; }

        .win-view { flex: 1; background: #1c1c1e; overflow: hidden; position: relative; }
        .win-nav { height: 40px; background: #1c1c1e; display: flex; justify-content: center; align-items: center; }
        .win-pill { width: 120px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* الحاسبة - تصميم آيفون الأصلي */
        .calc-wrapper { height: 100%; display: flex; flex-direction: column; background: #000; padding-bottom: 20px; }
        .calc-screen { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 30px; font-size: 4.5rem; font-weight: 200; }
        .calc-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px; }
        .key { aspect-ratio: 1/1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .key:active { filter: brightness(1.6); }
        .k-gray { background: #a5a5a5; color: #000; }
        .k-dark { background: #333; color: #fff; }
        .k-orange { background: #ff9f0a; color: #fff; }

        /* الإعدادات */
        .set-group { background: #2c2c2e; margin: 15px; border-radius: 12px; overflow: hidden; }
        .set-item { padding: 15px 20px; border-bottom: 0.5px solid #3e3e40; display: flex; justify-content: space-between; align-items: center; }
        .set-item:last-child { border-bottom: none; }
        .set-item input { background: #444; border: none; color: #fff; padding: 8px; border-radius: 6px; width: 120px; text-align: center; }

        /* الحقوق الدائمة */
        .rights-footer { padding: 40px; text-align: center; color: #555; font-size: 0.8rem; }
        .copyright-symbol { font-weight: 900; color: var(--ios-blue); }

    </style>
</head>
<body>

    <div id="wallpaper-master"></div>

    <div id="lock-screen" onclick="unlockSys()">
        <div class="lock-content">
            <div class="clock-big" id="clk">12:00</div>
            <div class="date-sub" id="dte">الخميس، 26 مارس</div>
        </div>
        <div class="unlock-area">
            <span style="opacity: 0.6;">انقر أو اسحب للفتح</span>
            <div class="home-indicator-lock"></div>
        </div>
    </div>

    <div id="status-bar">
        <div id="st-time">12:00</div>
        <div style="display:flex; gap:10px;">
            <span>LTE</span>
            <span>100%</span>
        </div>
    </div>

    <div id="desktop">
        </div>

    <div id="win-google" class="os-window">
        <div class="win-view"><iframe src="https://www.google.com/search?igu=1" id="g-frame" style="width:100%; height:100%; border:none;"></iframe></div>
        <div class="win-nav" onclick="closeApp('google')"><div class="win-pill"></div></div>
    </div>

    <div id="win-weather" class="os-window">
        <div class="win-view"><iframe src="https://www.google.com/search?q=weather+today&igu=1" style="width:100%; height:100%; border:none;"></iframe></div>
        <div class="win-nav" onclick="closeApp('weather')"><div class="win-pill"></div></div>
    </div>

    <div id="win-calc" class="os-window">
        <div class="win-view">
            <div class="calc-wrapper">
                <div class="calc-screen" id="c-scr">0</div>
                <div class="calc-keys">
                    <div class="key k-gray" onclick="cAction('AC')">AC</div><div class="key k-gray">+/-</div><div class="key k-gray">%</div><div class="key k-orange" onclick="cAction('/')">÷</div>
                    <div class="key k-dark" onclick="cAction('7')">7</div><div class="key k-dark" onclick="cAction('8')">8</div><div class="key k-dark" onclick="cAction('9')">9</div><div class="key k-orange" onclick="cAction('*')">×</div>
                    <div class="key k-dark" onclick="cAction('4')">4</div><div class="key k-dark" onclick="cAction('5')">5</div><div class="key k-dark" onclick="cAction('6')">6</div><div class="key k-orange" onclick="cAction('-')">-</div>
                    <div class="key k-dark" onclick="cAction('1')">1</div><div class="key k-dark" onclick="cAction('2')">2</div><div class="key k-dark" onclick="cAction('3')">3</div><div class="key k-orange" onclick="cAction('+')">+</div>
                    <div class="key k-dark" style="grid-column: span 2; border-radius: 50px; justify-content: flex-start; padding-left: 35px;" onclick="cAction('0')">0</div>
                    <div class="key k-dark">.</div><div class="key k-orange" onclick="cAction('=')">=</div>
                </div>
            </div>
        </div>
        <div class="win-nav" onclick="closeApp('calc')"><div class="win-pill"></div></div>
    </div>

    <div id="win-settings" class="os-window">
        <div class="win-view">
            <h1 style="padding: 40px 20px 10px;">الإعدادات</h1>
            <div class="set-group">
                <div class="set-item"><span>الاسم</span><input type="text" id="set-u-name" onchange="localStorage.setItem('hay_u', this.value)"></div>
                <div class="set-item"><span>الرمز (أرقام)</span><input type="number" pattern="[0-9]*" inputmode="numeric" id="set-u-pass" onchange="localStorage.setItem('hay_p', this.value)"></div>
            </div>
            <div class="set-group">
                <div class="set-item"><span>خلفية مخصصة</span><input type="file" accept="image/*" onchange="updateBg(this)"></div>
                <div class="set-item"><span>إصدار HAYBROS</span><span>16.0.4 PRO</span></div>
            </div>
            <div class="rights-footer">
                <p>نظام تشغيل افتراضي متكامل لعام 2026</p>
                <p class="copyright-symbol">الحقوق محفوظة لـ HAYBROS © 2026</p>
            </div>
        </div>
        <div class="win-nav" onclick="closeApp('settings')"><div class="win-pill"></div></div>
    </div>

    <script>
        /***********************************************************
         * HAYBROS CORE V16 - ENGINE SOURCE CODE
         ***********************************************************/

        const apps = [
            {id:'google', name:'جوجل', icon:'https://cdn-icons-png.flaticon.com/512/300/300221.png'},
            {id:'weather', name:'الطقس', icon:'https://cdn-icons-png.flaticon.com/512/1163/1163763.png'},
            {id:'calc', name:'الحاسبة', icon:'https://cdn-icons-png.flaticon.com/512/2344/2344132.png'},
            {id:'settings', name:'الإعدادات', icon:'https://cdn-icons-png.flaticon.com/512/3524/3524659.png'},
            {id:'safari', name:'سفاري', icon:'https://cdn-icons-png.flaticon.com/512/10015/10015509.png'},
            {id:'notes', name:'ملاحظات', icon:'https://cdn-icons-png.flaticon.com/512/889/889648.png'}
        ];

        window.onload = () => {
            initDesktop();
            initTime();
            loadUserPrefs();
            // تمديد الأسطر عبر إضافة لوق برمجي
            console.log("SYSTEM BOOT: SUCCESSFUL");
            console.log("KERNEL VERSION: 16.0.4-HAYBROS");
        };

        function initDesktop() {
            const desk = document.getElementById('desktop');
            apps.forEach((app, index) => {
                const node = document.createElement('div');
                node.className = 'app-node';
                node.style.animationDelay = (index * 0.1) + "s";
                node.onclick = () => openApp(app.id);
                node.innerHTML = `
                    <div class="app-icon" style="background-image:url('${app.icon}')"></div>
                    <div class="app-label">${app.name}</div>
                `;
                desk.appendChild(node);
            });
        }

        function initTime() {
            const update = () => {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const timeStr = `${h}:${m}`;
                document.getElementById('clk').innerText = timeStr;
                document.getElementById('st-time').innerText = timeStr;
                
                const opt = { weekday: 'long', day: 'numeric', month: 'long' };
                document.getElementById('dte').innerText = now.toLocaleDateString('ar-SA', opt);
            };
            setInterval(update, 1000);
            update();
        }

        function unlockSys() {
            const lock = document.getElementById('lock-screen');
            lock.style.transform = 'translateY(-100%)';
            document.getElementById('desktop').style.opacity = '1';
            document.getElementById('wallpaper-master').style.transform = 'scale(1)';
        }

        function openApp(id) {
            const win = document.getElementById('win-' + id);
            if(win) {
                win.style.display = 'flex';
                setTimeout(() => win.classList.add('open'), 10);
            } else {
                alert("تطبيق " + id + " متاح في النسخة المدفوعة فقط!");
            }
        }

        function closeApp(id) {
            const win = document.getElementById('win-' + id);
            win.classList.remove('open');
            setTimeout(() => win.style.display = 'none', 500);
        }

        // محرك الحاسبة المتقدم
        let calcVal = "";
        function cAction(act) {
            const scr = document.getElementById('c-scr');
            if(act === 'AC') { calcVal = ""; scr.innerText = "0"; }
            else if(act === '=') {
                try {
                    let result = eval(calcVal.replace('×', '*').replace('÷', '/'));
                    calcVal = String(result);
                    scr.innerText = calcVal;
                } catch { scr.innerText = "Error"; calcVal = ""; }
            } else {
                calcVal += act;
                scr.innerText = calcVal;
            }
        }

        function loadUserPrefs() {
            if(localStorage.getItem('hay_u')) document.getElementById('set-u-name').value = localStorage.getItem('hay_u');
            if(localStorage.getItem('hay_p')) document.getElementById('set-u-pass').value = localStorage.getItem('hay_p');
            if(localStorage.getItem('hay_bg')) document.getElementById('wallpaper-master').style.backgroundImage = `url(${localStorage.getItem('hay_bg')})`;
        }

        function updateBg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = e.target.result;
                    document.getElementById('wallpaper-master').style.backgroundImage = `url(${data})`;
                    localStorage.setItem('hay_bg', data);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
